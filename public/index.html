<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周会议保障清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-blue-600">📊 每周会议保障排期表</h1>

        <!-- 添加/修改会议表单 -->
        <div class="bg-white p-6 rounded-lg shadow-md mb-8 border-t-4 border-blue-500" id="formContainer">
            <h2 class="text-xl font-semibold mb-4" id="formTitle">➕ 新增会议任务</h2>
            <form id="addMeetingForm" class="grid grid-cols-2 gap-4">
                <!-- 隐藏的 ID 字段，用于判断是新增还是修改 -->
                <input type="hidden" id="edit_id" value="">

                <input type="text" id="title" placeholder="会议名称 (如: 业务周会)" required class="border p-2 rounded">
                <input type="datetime-local" id="meeting_time" required class="border p-2 rounded">
                
                <input type="text" id="location" placeholder="会议地点 (如: 1号会议室)" required class="border p-2 rounded">
                <select id="meeting_type" class="border p-2 rounded">
                    <option value="本地会">本地会</option>
                    <option value="视频会">视频会</option>
                    <option value="其他">其他</option>
                </select>

                <input type="text" id="department" placeholder="主办科室 (如: 综合办公室)" class="border p-2 rounded">
                <select id="status" class="border p-2 rounded">
                    <option value="都不参加">都不参加</option>
                    <option value="区市参加">区市参加</option>
                    <option value="区市、镇街参加">区市、镇街参加</option>
                </select>

                <input type="text" id="leader" placeholder="参会领导 (如: 张局、李总)" class="border p-2 rounded">
                <div class="hidden md:block"></div>

                <input type="text" id="notes" placeholder="保障要求 (如: 需准备投影仪、茶水、席位牌)" class="border p-2 rounded col-span-2">
                
                <!-- 按钮区域 -->
                <div class="col-span-2 flex gap-4 mt-2">
                    <button type="submit" id="submitBtn" class="flex-1 bg-blue-500 text-white p-2 rounded hover:bg-blue-600 transition-colors font-bold">保存会议排期</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden bg-gray-300 text-gray-700 p-2 rounded hover:bg-gray-400 transition-colors px-8 font-bold">取消修改</button>
                </div>
            </form>
        </div>

        <!-- 会议列表展示 -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-4 text-center">会议名称</th>
                            <th class="p-4 text-center">时间</th>
                            <th class="p-4 text-center">地点</th>
                            <th class="p-4 text-center">类型</th>
                            <th class="p-4 text-center">主办科室</th>
                            <th class="p-4 text-center">参会领导</th>
                            <th class="p-4 text-center">参会范围</th>
                            <th class="p-4 text-left">保障备注</th>
                            <th class="p-4 text-center">操作</th> <!-- 【新增】操作列 -->
                        </tr>
                    </thead>
                    <tbody id="meetingList">
                        <!-- 数据将通过 JS 动态加载 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 全局变量保存会议数据，方便点击修改时读取
        let meetingDataList = [];

        // 加载会议列表
        async function loadMeetings() {
            const res = await fetch('/api/meetings');
            meetingDataList = await res.json(); // 存入全局变量
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            
            meetingDataList.forEach(m => {
                let statusColor = 'text-gray-500';
                if (m.status === '区市、镇街参加') {
                    statusColor = 'text-red-600 font-bold';
                } else if (m.status === '区市参加') {
                    statusColor = 'text-blue-600 font-bold';
                }
                
                let typeStyle = m.meeting_type === '视频会' 
                    ? 'bg-purple-100 text-purple-700 border border-purple-200' 
                    : 'bg-gray-100 text-gray-700 border border-gray-200';
                
                let dept = m.department ? m.department : '-';
                let ldr = m.leader ? m.leader : '-';
                
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-gray-50 transition-colors">
                        <td class="p-4 font-medium text-center align-middle">${m.title}</td>
                        <td class="p-4 text-center align-middle">${m.meeting_time.replace('T', ' ')}</td>
                        <td class="p-4 text-center align-middle">${m.location}</td>
                        <td class="p-4 text-center align-middle">
                            <span class="px-2 py-1 rounded text-xs font-bold ${typeStyle}">${m.meeting_type}</span>
                        </td>
                        <td class="p-4 text-center align-middle">${dept}</td>
                        <td class="p-4 font-medium text-blue-800 text-center align-middle">${ldr}</td>
                        <td class="p-4 text-center align-middle ${statusColor}">${m.status}</td>
                        <td class="p-4 text-gray-500 text-sm min-w-[200px] max-w-md whitespace-normal break-words leading-relaxed text-left align-middle">${m.notes}</td>
                        
                        <!-- 【新增】修改和删除按钮 -->
                        <td class="p-4 text-center align-middle">
                            <button onclick="editMeeting(${m.id})" class="text-blue-500 hover:text-blue-800 font-bold mr-3 underline">修改</button>
                            <button onclick="deleteMeeting(${m.id})" class="text-red-400 hover:text-red-700 font-bold underline">删除</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 点击修改按钮，将数据填充到表单
        function editMeeting(id) {
            // 从全局数组里找到这条数据
            const meeting = meetingDataList.find(m => m.id === id);
            if(!meeting) return;

            // 填充表单
            document.getElementById('edit_id').value = meeting.id;
            document.getElementById('title').value = meeting.title;
            document.getElementById('meeting_time').value = meeting.meeting_time;
            document.getElementById('location').value = meeting.location;
            document.getElementById('meeting_type').value = meeting.meeting_type;
            document.getElementById('department').value = meeting.department;
            document.getElementById('leader').value = meeting.leader;
            document.getElementById('status').value = meeting.status;
            document.getElementById('notes').value = meeting.notes;

            // 改变表单外观，提示正在修改
            document.getElementById('formTitle').innerText = '✏️ 修改会议信息';
            document.getElementById('formContainer').classList.replace('border-blue-500', 'border-yellow-400');
            document.getElementById('submitBtn').innerText = '保存修改内容';
            document.getElementById('submitBtn').classList.replace('bg-blue-500', 'bg-yellow-500');
            document.getElementById('submitBtn').classList.replace('hover:bg-blue-600', 'hover:bg-yellow-600');
            document.getElementById('cancelBtn').classList.remove('hidden');

            // 页面平滑滚动回顶部表单处
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 恢复表单为新增状态
        function resetForm() {
            document.getElementById('addMeetingForm').reset();
            document.getElementById('edit_id').value = '';
            
            document.getElementById('meeting_type').value = '本地会';
            document.getElementById('status').value = '都不参加';

            document.getElementById('formTitle').innerText = '➕ 新增会议任务';
            document.getElementById('formContainer').classList.replace('border-yellow-400', 'border-blue-500');
            document.getElementById('submitBtn').innerText = '保存会议排期';
            document.getElementById('submitBtn').classList.replace('bg-yellow-500', 'bg-blue-500');
            document.getElementById('submitBtn').classList.replace('hover:bg-yellow-600', 'hover:bg-blue-600');
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        // 点击删除按钮
        async function deleteMeeting(id) {
            // 弹出密码框
            const pwd = prompt("⚠️ 删除操作需要权限，请输入管理员密码：");
            if (pwd === null) return; // 用户点了取消
            if (pwd.trim() === "") {
                alert("密码不能为空！");
                return;
            }

            const res = await fetch(`/api/meetings?id=${id}`, {
                method: 'DELETE',
                headers: {
                    'X-Admin-Password': pwd // 把密码放到请求头里发给后端验证
                }
            });

            if (res.ok) {
                alert("✅ 删除成功！");
                loadMeetings(); // 刷新列表
            } else {
                const errorData = await res.json();
                alert(`❌ 删除失败：${errorData.error}`);
            }
        }

        // 提交表单 (合并了新增和修改的逻辑)
        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };

            // 如果有 editId，说明是修改(PUT)，否则是新增(POST)
            const method = editId ? 'PUT' : 'POST';

            await fetch('/api/meetings', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            resetForm(); // 清空并重置表单状态
            loadMeetings(); // 重新加载列表
        });

        // 初始加载
        loadMeetings();
    </script>
</body>
</html>
